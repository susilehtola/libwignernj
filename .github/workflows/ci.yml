name: CI

# Architecture coverage policy
# ----------------------------
# Every conditional code path (compiler-detected, build-flag-gated,
# arch-detected) must be exercised by at least one cell that runs the
# full test suite on each architecture where that path is selected in
# production.  The cells in this file currently cover:
#
#   - x86-64 Linux GCC / Clang   (every push, free runners)
#   - x86-64 Windows MSVC        (every push, free runner)
#   - arm64 Linux GCC            (every push, free runner)
#   - arm64 macOS Clang          (every push, free runner)
#   - arm64 Windows MSVC         (every push, free runner)
#
# Override-on-x86-64 cells like -DBIGINT_NO_DIVQ and
# -DBIGINT_FORCE_PORTABLE are valuable as fast smoke tests of the
# arm64 / MSVC dispatch arms on x86-64 hardware, but they do not
# substitute for the native-arch cells above.
#
# Architectures NOT continuously covered (no free public runner):
#
#   - ppc64le (POWER LE), s390x (IBM Z), i686 (32-bit x86)
#
# These are tested at release time via a manual sweep across all
# current Fedora architectures; the result is documented in the
# paper and in section "Implementation limits and portability" of
# the manuscript.  A push that introduces an architecture-conditional
# code path for any of these targets MUST add a corresponding cell
# (qemu-emulated if necessary) before merging.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Build-system consistency ──────────────────────────────────────────────
  # The CMake LIB_SOURCES list and setup.py sources list compile the same C
  # library twice; if they drift, the Python extension links with an
  # undefined-symbol error that surfaces as "0 tests collected" rather than
  # a clear failure.  This check is fast (<1 s) and catches the drift early.
  check-source-lists:
    name: "Source-list consistency"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare CMakeLists.txt and setup.py source lists
        run: python3 tools/check_source_lists.py

  # ── Build and test matrix ─────────────────────────────────────────────────
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu / GCC / shared"
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            fortran: ON
            mpfr: ON
            quadmath: ON
            flint: OFF
            shared: ON

          - name: "Ubuntu / GCC / static"
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            fortran: ON
            mpfr: ON
            quadmath: ON
            flint: OFF
            shared: OFF

          - name: "Ubuntu / Clang"
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            fortran: ON
            mpfr: ON
            quadmath: ON
            flint: OFF
            shared: ON

          - name: "macOS / Clang"
            os: macos-latest
            cc: clang
            cxx: clang++
            fortran: ON
            mpfr: ON
            # macOS clang ships without libquadmath; __float128 is not
            # available on the homebrew-installed clang either.
            quadmath: OFF
            flint: OFF
            shared: ON

          # Confirm the library builds without optional features.
          - name: "Ubuntu / GCC / minimal"
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            fortran: OFF
            mpfr: OFF
            quadmath: OFF
            flint: OFF
            shared: ON

          # FLINT bigint backend: replaces the schoolbook bigint
          # implementation with a thin wrapper around FLINT's fmpz_t.
          # Bit-identical floating-point output is verified against
          # the schoolbook by re-running the entire test suite.
          - name: "Ubuntu / GCC / FLINT backend"
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            fortran: ON
            mpfr: ON
            quadmath: ON
            flint: ON
            shared: ON

          # arm64 Linux + GCC.  Pairs with macos-latest's arm64 Clang
          # to give native arm64 coverage of the bigint_div128
          # __uint128_t + Algorithm D path on every push (no hardware
          # 128/64 instruction on aarch64), in addition to ensuring
          # the bigint multi-word arithmetic and the per-thread
          # caches remain endian-clean and ABI-correct on this
          # increasingly common server / cloud target.
          # libquadmath / __float128 is a GCC x86-specific extension and
          # has no aarch64 (or ppc64le, s390x) counterpart, so quadmath
          # must be OFF here.  FLINT is also OFF since libflint-dev is
          # available on arm64 Ubuntu but pulls in a long dependency
          # chain; the FLINT-backend identity check runs on x86-64 and
          # is sufficient.
          - name: "Ubuntu / GCC / arm64"
            os: ubuntu-24.04-arm
            cc: gcc
            cxx: g++
            fortran: ON
            mpfr: ON
            quadmath: OFF
            flint: OFF
            shared: ON

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          if [ "${{ matrix.fortran }}" = "ON" ]; then
            sudo apt-get install -y gfortran
          fi
          if [ "${{ matrix.mpfr }}" = "ON" ]; then
            sudo apt-get install -y libmpfr-dev
          fi
          # libquadmath is a GCC x86-specific extension; the package
          # exists only on x86-64 Ubuntu, hence the quadmath gate.
          if [ "${{ matrix.quadmath }}" = "ON" ]; then
            sudo apt-get install -y libquadmath0
          fi
          if [ "${{ matrix.flint }}" = "ON" ]; then
            sudo apt-get install -y libflint-dev
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc mpfr
          GFC=$(find "$(brew --prefix gcc)/bin" -name 'gfortran-*' \
                | sort -t- -k2 -V | tail -1)
          echo "FC=$GFC" >> "$GITHUB_ENV"

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DBUILD_SHARED_LIBS=${{ matrix.shared }} \
            -DBUILD_FORTRAN=${{ matrix.fortran }} \
            -DBUILD_MPFR=${{ matrix.mpfr }} \
            -DBUILD_QUADMATH=${{ matrix.quadmath }} \
            -DBUILD_FLINT=${{ matrix.flint }} \
            -DBUILD_CXX_TESTS=ON \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel

  # ── Pure-C99 bigint fallback ──────────────────────────────────────────────
  # bigint.c uses __uint128_t on GCC/Clang/ICC for 64x64 -> 128 products and
  # 128/64 divisions; on compilers without that extension (notably MSVC) a
  # pure-C99 fallback is selected automatically.  This job forces the
  # fallback via -DBIGINT_FORCE_PORTABLE and runs the full test suite to
  # ensure the two code paths produce identical bit-exact results.
  c99-fallback:
    name: "Ubuntu / GCC / pure-C99 bigint fallback"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gfortran libmpfr-dev

      - name: Configure (force C99 fallback)
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -B build \
            -DBUILD_FORTRAN=ON \
            -DBUILD_MPFR=ON \
            -DBUILD_CXX_TESTS=ON \
            -DBUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-DBIGINT_FORCE_PORTABLE"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel

  # ── __uint128_t software-emulation division path ──────────────────────────
  # bigint_div128 has three code paths on x86-64: the hardware divq inline
  # asm (the default), the __uint128_t / d expression that GCC compiles into
  # libgcc's __udivmodti4 software emulation, and the pure-C99 32-bit
  # fallback.  -DBIGINT_NO_DIVQ disables the divq asm without disabling
  # __uint128_t, so this cell exercises the middle path on x86-64 hardware
  # -- the same path that runs on aarch64, ppc64le, and any other target
  # with __uint128_t but no hardware 128/64 instruction.  Together with the
  # c99-fallback cell above, every dispatch arm of bigint_div128 is now
  # tested on every push.
  no-divq:
    name: "Ubuntu / GCC / __uint128_t division (no divq asm)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gfortran libmpfr-dev

      - name: Configure (disable divq asm, keep __uint128_t)
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -B build \
            -DBUILD_FORTRAN=ON \
            -DBUILD_MPFR=ON \
            -DBUILD_CXX_TESTS=ON \
            -DBUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-DBIGINT_NO_DIVQ"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel

  # ── Link-time optimisation off ────────────────────────────────────────────
  # BUILD_LTO defaults to ON now that libwignernj is positioned as a
  # high-performance math library, so every other cell in this file
  # exercises the LTO-on dispatch.  This cell exists to keep the
  # LTO-off fallback compiling clean and producing identical test
  # output -- consumers who need a fast build (Debug, sanitizers,
  # static analysis) reach for -DBUILD_LTO=OFF and we want that path
  # to stay green.
  build-no-lto:
    name: "Ubuntu / GCC / no LTO"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gfortran libmpfr-dev libquadmath0

      - name: Configure
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -B build \
            -DBUILD_FORTRAN=ON \
            -DBUILD_MPFR=ON \
            -DBUILD_QUADMATH=ON \
            -DBUILD_CXX_TESTS=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_LTO=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel

  # ── No-TLS fallback ───────────────────────────────────────────────────────
  # The per-thread cached scratch and factorial-decomposition cache select
  # one of __thread / __declspec(thread) / _Thread_local on every supported
  # toolchain, falling back to per-call allocation on hypothetical compilers
  # without any TLS keyword.  -DWIGNERNJ_FORCE_NO_TLS forces that fallback
  # path on, ensuring it stays compiling and continues to produce identical
  # results.
  no-tls-fallback:
    name: "Ubuntu / GCC / no-TLS fallback"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gfortran libmpfr-dev

      - name: Configure (force no-TLS fallback)
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -B build \
            -DBUILD_FORTRAN=ON \
            -DBUILD_MPFR=ON \
            -DBUILD_CXX_TESTS=ON \
            -DBUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-DWIGNERNJ_FORCE_NO_TLS"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel

  # ── Downstream CMake package detection ────────────────────────────────────
  # Verifies that an installed libwignernj exports the C, C++ (header-only
  # wrapper), and Fortran 90 interfaces correctly so that a downstream CMake
  # project can locate them via find_package(wignernj REQUIRED [COMPONENTS
  # Fortran]) and link against the wignernj::wignernj / wignernj::
  # wignernj_f03 imported targets.  Built as a separate, out-of-tree
  # CMake project against the installed library.
  cmake-downstream:
    name: "Ubuntu / GCC / downstream find_package(wignernj)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gfortran

      - name: Test downstream detection (shared, C + C++)
        run: tests/cmake_downstream/run.sh

      - name: Test downstream detection (shared, C + C++ + Fortran)
        run: tests/cmake_downstream/run.sh --with-fortran

      - name: Test downstream detection (static, C + C++)
        run: tests/cmake_downstream/run.sh --static

      - name: Test downstream detection (static, C + C++ + Fortran)
        run: tests/cmake_downstream/run.sh --static --with-fortran

  # ── Address and undefined-behaviour sanitizers ────────────────────────────
  sanitize:
    name: "Ubuntu / Clang / ASAN+UBSAN"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libmpfr-dev

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_FORTRAN=OFF \
            -DBUILD_MPFR=ON \
            -DBUILD_CXX_TESTS=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_LTO=OFF \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel

  # ── Python extension ──────────────────────────────────────────────────────
  python:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e . pytest

      - name: Test
        run: python -m pytest tests/python/ -v

  # ── Windows / MSVC ────────────────────────────────────────────────────────
  # Verifies that the library builds and the test suite passes under
  # Microsoft Visual C++ on both Windows architectures.  MSVC has no
  # __uint128_t, so the pure-C99 fallback path of bigint_arith.h is
  # exercised here without an explicit -DBIGINT_FORCE_PORTABLE.
  # Running this on both x86-64 (windows-latest) and arm64
  # (windows-11-arm) gives every push native MSVC coverage on each
  # Windows arch, since MSVC's arm64 codegen can differ from x86-64
  # in carry / overflow handling and stack-frame layout.  Fortran
  # and MPFR are disabled on these runners -- gfortran is not part of
  # a default MSVC toolchain and libmpfr is not in the runner image.
  # C++ tests are kept on, since the header-only wrapper exercises
  # both the C library and a C++11 compiler.
  build-windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows / MSVC (x86-64)"
            os: windows-latest
          - name: "Windows / MSVC (arm64)"
            os: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: cmd
        run: |
          cmake -B build ^
            -DBUILD_FORTRAN=OFF ^
            -DBUILD_MPFR=OFF ^
            -DBUILD_TESTS=ON ^
            -DBUILD_CXX_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --parallel
