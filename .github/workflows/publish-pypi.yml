#
# Build wheels + sdist with cibuildwheel and publish to PyPI on every
# v*-tag push.  Wheels are produced for CPython 3.9 .. 3.13 on
# Linux x86_64 (manylinux + musllinux), Linux aarch64 (native runner),
# macOS Apple Silicon, and Windows x86_64; the sdist is the canonical
# fallback for any platform / interpreter not covered by a wheel.
#
# Authentication: PyPI Trusted Publishing (OIDC).  Configure the PyPI
# side first by adding a "pending publisher" at
# https://pypi.org/manage/account/publishing/ matching:
#   PyPI project name : wignernj
#   Owner             : susilehtola
#   Repository        : libwignernj
#   Workflow filename : publish-pypi.yml
#   Environment       : pypi
# After the first publish the entry moves from "pending" to "trusted".
# The publish job below requests `id-token: write` so the OIDC handshake
# succeeds without any token in repository secrets.
#
# Manual dispatch is allowed but only the publish step uploads, and
# Trusted Publishing only accepts pushes to tags or to the configured
# environment, so a workflow_dispatch run can also be used to test the
# wheel builds without actually publishing (the publish job will
# refuse).

name: Build and publish wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest        # manylinux + musllinux x86_64
          - ubuntu-24.04-arm     # native arm64 runner; no QEMU needed
          - macos-latest         # Apple Silicon
          - windows-latest       # MSVC x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2
        env:
          # Match the Python matrix already exercised by the
          # per-push CI in ci.yml: 3.9, 3.11, 3.13.  cibuildwheel's
          # default also adds 3.10 and 3.12 which is fine -- the
          # extension is API-stable across CPython 3.9..3.13.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          # macOS Apple Silicon only; we do not build x86_64 macOS
          # wheels because the macOS hosted runner went arm64-only
          # in 2024 and the extension is small enough that universal2
          # wheels would double the wheel size for a vanishing audience.
          CIBW_ARCHS_MACOS: "arm64"
          # Linux: cibuildwheel auto-selects manylinux2014 + musllinux
          # for the host architecture; the matrix entry chooses the
          # architecture (x86_64 vs aarch64).
          # Smoke-test every wheel before it is uploaded.
          CIBW_TEST_COMMAND: >
            python -c "import wignernj;
            v = wignernj.wigner3j(2,2,2,0,0,0);
            assert abs(v - (-0.23904572186687872)) < 1e-15,
            f'wigner3j(2,2,2;0,0,0) = {v}, expected -0.23904572186687872'"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    # Only publish on actual tag pushes, not on manual workflow_dispatch
    # runs.  This lets a maintainer dry-run the wheel builds without
    # accidentally uploading a release.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wignernj
    permissions:
      id-token: write   # for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          # cibuildwheel uploads each OS's wheels under wheels-<os>/
          # and the sdist under sdist/; merge-multiple: true flattens
          # everything into dist/ for the publish action.
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
